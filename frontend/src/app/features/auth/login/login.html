<div class="auth-page">
  <div class="auth-card card">
    <h1 class="auth-title">Loveratory</h1>
    <p class="auth-subtitle">實驗室受試者報名管理系統</p>

    @if (errorMessage()) {
      <div class="auth-error">{{ errorMessage() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="請輸入 Email"
          autocomplete="email"
        />
        @if (form.controls.email.touched && form.controls.email.errors) {
          <div class="error-text">請輸入有效的 Email</div>
        }
      </div>

      <div class="form-group">
        <label for="password">密碼</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="請輸入密碼"
          autocomplete="current-password"
        />
        @if (form.controls.password.touched && form.controls.password.errors) {
          <div class="error-text">請輸入密碼</div>
        }
      </div>

      <button
        type="submit"
        class="btn btn-primary auth-btn"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
        }
        登入
      </button>
    </form>

    <p class="auth-link">
      還沒有帳號？<a routerLink="/register">註冊</a>
    </p>
  </div>
</div>
