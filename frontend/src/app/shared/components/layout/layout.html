<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Loveratory</div>
    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/labs" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        <span class="nav-icon">&#x1F3E0;</span>
        <span>我的實驗室</span>
      </a>
      @if (isAdmin) {
        <a class="nav-item" routerLink="/admin/labs" routerLinkActive="active">
          <span class="nav-icon">&#x2699;&#xFE0F;</span>
          <span>系統管理</span>
        </a>
      }
    </nav>
  </aside>

  <div class="main-area">
    <header class="header">
      <div class="header-title">Loveratory</div>
      <div class="header-user">
        <span class="user-name">{{ user?.name }}</span>
        <button class="btn btn-secondary btn-sm" (click)="logout()">登出</button>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
